<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Successful | ISEES Technologies</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    width: 520px;
    background: white;
    padding: 40px 50px;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    animation: fadeIn 0.9s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

.details {
    text-align: left; margin-top: 20px; padding: 15px;
    border-radius: 12px; background: #f7f7f7;
}

.btn {
    margin-top: 20px; padding: 12px 25px; font-size: 16px;
    border: none; border-radius: 30px; background: #007bff;
    color: white; cursor: pointer; transition: 0.3s;
}

.btn:hover { background: #0056b3; }
.btn.download { background: #28a745; }
.btn.download:hover { background: #1e7e34; }

#receiptContent {
    visibility: hidden;
    position: absolute;
    left: -9999px;
    top: -9999px;
    width: 700px;
    padding: 25px;
    border: 2px solid #000;
    font-size: 18px;
    background: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
}
</style>

<!-- Required Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

<div class="container">
    <h1 style="color:#28a745;">Payment Successful 🎉</h1>
    <p>Thank you for your payment. Your receipt is ready to download.</p>

    <div class="details">
        <p><strong>Name:</strong> <span id="name"></span></p>
        <p><strong>Email:</strong> <span id="email"></span></p>
        <p><strong>Course:</strong> <span id="course"></span></p>
        <p><strong>Total Fee:</strong> ₹<span id="total"></span></p>
        <p><strong>Paid:</strong> ₹<span id="paid"></span></p>
        <p><strong>Remaining:</strong> ₹<span id="remaining"></span></p>
    </div>

    <button class="btn" id="homeBtn">Go to Home</button>
    <button class="btn download" id="downloadBtn">Download Receipt</button>
</div>

<!-- Hidden Printable PDF Section -->
<div id="receiptContent">
    <h2 style="text-align:center;">ISEES TECHNOLOGIES</h2>
    <h3 style="text-align:center;">Payment Receipt</h3>
    <hr>
    <p><strong>Name:</strong> <span id="rname"></span></p>
    <p><strong>Email:</strong> <span id="remail"></span></p>
    <p><strong>Course:</strong> <span id="rcourse"></span></p>
    <p><strong>Total Fee:</strong> ₹<span id="rtotal"></span></p>
    <p><strong>Paid:</strong> ₹<span id="rpaid"></span></p>
    <p><strong>Remaining:</strong> ₹<span id="rremaining"></span></p>
    <hr>
    <p style="text-align:center;">Thank you for your payment!</p>
</div>

<script>
// Get session_id from URL
const params = new URLSearchParams(window.location.search);
const sessionId = params.get("session_id");

if (!sessionId) {
    alert("Invalid payment session");
    window.location.href = "/student-dash.html";
}

// Fetch payment details from backend
fetch(`/Student-free/verify-payment/${sessionId}`)
.then(res => res.json())
.then(data => {

    document.getElementById("name").textContent = data.sname;
    document.getElementById("email").textContent = data.email;
    document.getElementById("course").textContent = data.courseName;
    document.getElementById("total").textContent = data.totalfree;
    document.getElementById("paid").textContent = data.paidfree;
    document.getElementById("remaining").textContent = data.remainingfree;

    document.getElementById("rname").textContent = data.sname;
    document.getElementById("remail").textContent = data.email;
    document.getElementById("rcourse").textContent = data.courseName;
    document.getElementById("rtotal").textContent = data.totalfree;
    document.getElementById("rpaid").textContent = data.paidfree;
    document.getElementById("rremaining").textContent = data.remainingfree;

})
.catch(err=>{
    alert("Payment verification failed");
});

// Home button
document.getElementById("homeBtn").addEventListener("click", () => {
    window.location.href = "/student-dash.html";
});

// Download PDF
document.getElementById("downloadBtn").addEventListener("click", async () => {
    const receipt = document.getElementById("receiptContent");
    receipt.style.visibility = "visible";

    const canvas = await html2canvas(receipt, { scale: 2 });
    const imgData = canvas.toDataURL("image/png");

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    const width = pdf.internal.pageSize.getWidth();
    const height = (canvas.height * width) / canvas.width;

    pdf.addImage(imgData, "PNG", 0, 0, width, height);
    pdf.save("payment_receipt.pdf");

    receipt.style.visibility = "hidden";
});
</script>

</body>
</html>
