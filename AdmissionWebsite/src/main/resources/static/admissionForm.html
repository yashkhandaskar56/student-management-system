<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admission Payment Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  padding:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#4f46e5,#6366f1);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  background:#ffffff;
  width:90%;
  max-width:500px;
  border-radius:14px;
  padding:35px 30px;
  text-align:center;
  box-shadow:0 15px 35px rgba(0,0,0,0.25);
  animation:fadeIn 0.6s ease-in-out;
}

.check{
  width:80px;
  height:80px;
  border-radius:50%;
  background:#dcfce7;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 20px;
}

.check svg{
  width:45px;
  height:45px;
  color:#16a34a;
}

h2{
  color:#16a34a;
  margin-bottom:10px;
}

p{
  color:#374151;
  font-size:16px;
  line-height:1.6;
}

.info{
  margin-top:20px;
  background:#f1f5f9;
  padding:15px;
  border-radius:10px;
  font-size:14px;
  color:#475569;
}

.actions{
  margin-top:25px;
  display:flex;
  justify-content:center;
}

.home-btn{
  background:#4f46e5;
  color:#fff;
  border:none;
  padding:12px 26px;
  border-radius:10px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.home-btn:hover{
  opacity:0.9;
}

.footer{
  margin-top:20px;
  font-size:13px;
  color:#6b7280;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">
  <div class="check">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M5 13l4 4L19 7"/>
    </svg>
  </div>

  <h2>Payment Successful 🎉</h2>
  <p>We are confirming your admission details.<br>Please wait a moment…</p>

  <div class="info">
    ✔ Admission Form Fee Paid Successfully<br>
    ✔ Admission Status Updated<br>
    ✔ Confirmation Email Sent
  </div>

  <div class="actions">
    <button class="home-btn" onclick="goHome()">Back to Home</button>
  </div>

  <div class="footer">
    Thank you for choosing <b>ISEES Technologies</b><br>
    You may safely close this window.
  </div>
</div>

<!-- 🔥 YOUR JS LOGIC – UNCHANGED -->
<script>
const urlParams = new URLSearchParams(window.location.search);
const sessionId = urlParams.get('session_id');

if(sessionId){
  fetch(`http://localhost:8080/admission/payment-success?session_id=${sessionId}`)
    .then(res => res.text())
    .then(msg => {
      document.querySelector('p').innerText = msg;
    })
    .catch(err => {
      document.querySelector('p').innerText = "Error processing payment!";
      console.error(err);
    });
} else {
  document.querySelector('p').innerText = "No session ID found!";
}
</script>

<!-- ✅ ONLY NEW JS (SAFE) -->
<script>
function goHome(){
  window.location.href = "homepage.html"; 
  // 🔁 change this path if your home page name is different
}
</script>

</body>
</html>
