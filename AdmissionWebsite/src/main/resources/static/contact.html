<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - ISEES TECHNOLOGIES</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  body { background: linear-gradient(135deg,#fceabb,#f8b500); }

  /* Hero Section */
  .hero { width:100%; background:#ff6b81; padding:60px 20px; text-align:center; color:#fff; border-bottom:5px solid #ff9a76; }
  .hero h1 { font-size:48px; margin-bottom:10px; }
  .hero p { font-size:20px; }

  /* Contact Container */
  .contact-container { display:flex; flex-wrap:wrap; justify-content:center; margin:50px auto; max-width:1100px; gap:30px; }

  /* Contact Form */
  .contact-form { flex:1; min-width:320px; background:#ffffffee; padding:40px; border-radius:20px; box-shadow:0 12px 25px rgba(0,0,0,0.3); }
  .contact-form h2 { color:#ff6b81; margin-bottom:20px; text-align:center; }
  .contact-form input, .contact-form textarea { width:100%; padding:15px; margin-bottom:15px; border-radius:10px; border:1px solid #ccc; font-size:16px; }
  .contact-form button { width:100%; padding:16px; border:none; border-radius:12px; background:linear-gradient(45deg,#ff6b81,#ff9a76); color:#fff; font-size:18px; font-weight:600; cursor:pointer; transition:0.3s; }
  .contact-form button:hover { transform:translateY(-3px) scale(1.02); background:linear-gradient(45deg,#ff9a76,#ff6b81); }

  /* Contact Info */
  .contact-info { flex:1; min-width:300px; background:#ffffffee; padding:40px; border-radius:20px; box-shadow:0 12px 25px rgba(0,0,0,0.3); }
  .contact-info h2 { color:#118ab2; margin-bottom:20px; text-align:center; }
  .contact-info p { font-size:16px; margin-bottom:12px; color:#555; }
  .contact-info a { color:#ff6b81; text-decoration:none; font-weight:600; }
  .contact-info a:hover { text-decoration:underline; }

  /* Map */
  .contact-info iframe { width:100%; height:250px; border-radius:15px; border:0; margin-top:15px; }

  /* Footer */
  footer { background:#ff6b81; color:#fff; text-align:center; padding:25px 10px; margin-top:50px; border-radius:15px; }
  footer a { color:#fff; text-decoration:none; font-weight:bold; margin:0 10px; }
  footer a:hover { text-decoration:underline; }

  @media(max-width:900px){ .contact-container{ flex-direction:column; align-items:center; } }
</style>
</head>
<body>

  <!-- Hero Section -->
  <div class="hero">
    <h1>Contact Us</h1>
    <p>We’d love to hear from you! Send us a message or reach out directly.</p>
  </div>

  <!-- Contact Section -->
  <div class="contact-container">
    <!-- Form -->
    <div class="contact-form">
      <h2>Send a Message</h2>
      <form id="contactForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="text" id="mobile" placeholder="Mobile Number" required maxlength="10">
        <textarea id="message" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
      </form>
      <div id="alert" style="margin-top:15px; display:none; font-weight:600; border-radius:10px; padding:12px;"></div>
    </div>

    <!-- Contact Info -->
    <div class="contact-info">
      <h2>Get in Touch</h2>
      <p><strong>Email:</strong> <a href="mailto:info@iseestech.com">info@iseestech.com</a></p>
      <p><strong>Phone:</strong> <a href="tel:+917057328701">+91 7057328701</a></p>
      <p><strong>Address:</strong> 123, Education Street, Mumbai, India</p>
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3769.1234567890!2d72.123456!3d19.123456!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be7c1234567890%3A0x123456789abcdef!2sISEES%20TECHNOLOGIES!5e0!3m2!1sen!2sin!4v1600000000000!5m2!1sen!2sin" allowfullscreen="" loading="lazy"></iframe>
    </div>
  </div>

  <div style="text-align:center; margin-top:20px;">
    <button onclick="goBack()" style="
      padding:12px 25px;
      background:linear-gradient(45deg,#06d6a0,#118ab2);
      color:#fff;
      border:none;
      border-radius:10px;
      font-weight:600;
      cursor:pointer;
      transition:all 0.3s ease;
    ">Back</button>
  </div>
  <!-- Footer -->
  <footer>
    <p>&copy; 2025 ISEES TECHNOLOGIES. All Rights Reserved.</p>
    <p>
      <a href="#">Facebook</a> | 
      <a href="#">Twitter</a> | 
      <a href="#">Instagram</a>
    </p>
  </footer>

<script>
const contactForm = document.getElementById('contactForm');
const alertBox = document.getElementById('alert');

contactForm.addEventListener('submit', (e)=>{
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const mobile = document.getElementById('mobile').value.trim();
  const message = document.getElementById('message').value.trim();

  if(!name || !email || !mobile || mobile.length!==10 || !message){
    alertBox.style.display='block';
    alertBox.style.background='#f8d7da';
    alertBox.style.color='#721c24';
    alertBox.textContent='Please fill all fields correctly. Mobile must be 10 digits.';
    return;
  }

  alertBox.style.display='block';
  alertBox.style.background='#d4edda';
  alertBox.style.color='#155724';
  alertBox.textContent='✅ Message sent successfully!';
  contactForm.reset();
  setTimeout(()=>alertBox.style.display='none',8000);
});

function goBack() {
  window.history.back();
}
</script>

</body>
</html>
