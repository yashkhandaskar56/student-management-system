<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Course Materials</title>
<style>
  body { font-family: Arial, sans-serif; background:#f4f4f9; margin:0; padding:0; }
  .container { max-width:900px; margin:40px auto; padding:20px; background:#fff; border-radius:10px; box-shadow:0 3px 12px rgba(0,0,0,0.1); }
  h2 { color:#1e3c72; text-align:center; margin-bottom:20px; }
  form { display:flex; flex-direction:column; gap:12px; margin-bottom:30px; }
  input, textarea, select, button { padding:10px; font-size:15px; border:1px solid #ccc; border-radius:6px; }
  button { background:#1e3c72; color:white; border:none; cursor:pointer; transition:.2s; }
  button:hover { background:#16315e; }
  table { width:100%; border-collapse:collapse; margin-top:20px; }
  th, td { padding:10px; border:1px solid #ddd; text-align:left; }
  th { background:#1e3c72; color:white; }
  .download-btn { background:#4caf50; color:white; padding:6px 12px; border-radius:6px; border:none; cursor:pointer; transition:.2s; }
  .download-btn:hover { background:#388e3c; }
  .message { padding:10px; margin-bottom:15px; border-radius:6px; display:none; }
  .success { background:#d4edda; color:#155724; }
  .error { background:#f8d7da; color:#721c24; }
</style>
</head>
<body>

<div class="container">
  <h2>Admin - Manage Course Materials</h2>

  <div id="msg" class="message"></div>

  <form id="uploadForm">
    <label>Course Name</label>
    <input type="text" name="courseName" required placeholder="Enter course name">

    <label>Title</label>
    <input type="text" name="title" required placeholder="Material title">

    <label>Description</label>
    <textarea name="description" rows="3" placeholder="Material description"></textarea>

    <label>Select File</label>
    <input type="file" name="file" required>

    <button type="submit">Upload Material</button>
  </form>

  <h3>All Materials</h3>
  <table id="materialsTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Course</th>
        <th>Title</th>
        <th>Description</th>
        <th>Filename</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <!-- Filled dynamically -->
    </tbody>
  </table>
</div>

<script>
const BASE = "http://localhost:8080/Course-Material";
const form = document.getElementById("uploadForm");
const msgBox = document.getElementById("msg");
const tableBody = document.querySelector("#materialsTable tbody");

// Show messages
function showMessage(text, type="success") {
    msgBox.innerText = text;
    msgBox.className = `message ${type}`;
    msgBox.style.display = "block";
    setTimeout(()=> msgBox.style.display="none", 4000);
}

// Upload material
form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const formData = new FormData(form);

    try {
        const res = await fetch(`${BASE}/upload`, {
            method: "POST",
            body: formData
        });

        if (!res.ok) throw new Error("Upload failed");

        const saved = await res.json();
        showMessage("Material uploaded successfully ✅");
        form.reset();
        loadMaterials();

    } catch(err) {
        console.error(err);
        showMessage("Error uploading material ❌", "error");
    }
});

// Load all materials
async function loadMaterials() {
    try {
        const res = await fetch(`${BASE}/All`);
        if(!res.ok) throw new Error("Failed to fetch materials");

        const materials = await res.json();

        tableBody.innerHTML = materials.map(m => `
            <tr>
                <td>${m.id}</td>
                <td>${m.courseName}</td>
                <td>${m.title}</td>
                <td>${m.description || "-"}</td>
                <td>${m.filename}</td>
                <td>
                  <button class="download-btn" onclick="downloadMaterial(${m.id},'${m.filename}')">Download</button>
                </td>
            </tr>
        `).join("");

    } catch(err) {
        console.error(err);
        tableBody.innerHTML = `<tr><td colspan="6">Error loading materials</td></tr>`;
    }
}

// Download file
function downloadMaterial(id, filename) {
    if(!id) return;
    window.open(`${BASE}/download/id/${id}`, "_blank");
}

// Init
loadMaterials();
</script>

</body>
</html>
