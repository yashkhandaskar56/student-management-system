<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us | ISESS Technologies</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Tahoma, sans-serif;
}

body {
    background: #f5f7fb;
    color: #222;
}

/* ================= HEADER ================= */
header {
    height: 70px;
    background: #0a7cff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 50px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo img {
    height: 36px;
}

.logo span {
    color: #fff;
    font-size: 20px;
    font-weight: 700;
}

nav a {
    margin-left: 25px;
    text-decoration: none;
    color: #fff;
    font-size: 14px;
    font-weight: 500;
}

nav a:hover {
    text-decoration: underline;
}

/* ================= PAGE ================= */
.contact-page {
    padding: 70px 60px;
}

/* ================= TITLE ================= */
.page-title {
    text-align: center;
    margin-bottom: 50px;
}

.page-title h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.page-title p {
    color: #555;
    font-size: 16px;
}

/* ================= CONTENT ================= */
.contact-container {
    display: flex;
    gap: 50px;
}

/* LEFT INFO */
.contact-info {
    flex: 1;
}

.info-box {
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    border: 1px solid #e1ebff;
    margin-bottom: 25px;
}

.info-box h3 {
    color: #0a7cff;
    margin-bottom: 10px;
}

.info-box p {
    font-size: 14px;
    color: #555;
    line-height: 1.6;
}

/* RIGHT FORM */
.contact-form {
    flex: 1;
    background: #ffffff;
    padding: 35px;
    border-radius: 12px;
    border: 1px solid #e1ebff;
}

.contact-form h2 {
    margin-bottom: 20px;
}

label {
    display: block;
    margin-top: 16px;
    font-size: 14px;
}

input, textarea {
    width: 100%;
    margin-top: 6px;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

textarea {
    resize: none;
    height: 120px;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #0a7cff;
}

/* BUTTON */
button {
    margin-top: 22px;
    width: 100%;
    padding: 14px;
    background: #ffffff;
    color: #0a7cff;
    border: 2px solid #0a7cff;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    background: #0a7cff;
    color: #ffffff;
}

/* ================= FOOTER ================= */
footer {
    margin-top: 80px;
    background: #0a7cff;
    color: #ffffff;
    text-align: center;
    padding: 20px;
    font-size: 14px;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 900px) {
    .contact-container {
        flex-direction: column;
    }

    header {
        padding: 0 20px;
    }

    .contact-page {
        padding: 50px 25px;
    }
}
</style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header>
    <div class="logo">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQK7xrouMnQROY0c08ckilxzOYDvzD37fdIKg&s" alt="ISESS Logo" alt="ISESS Logo">
        <span>ISESS Technologies</span>
    </div>

    <nav>
        <a href="public-home.html">Home</a>
        <a href="about.html">About</a>
        <a href="public-homeContact.html">Contact</a>
    </nav>
</header>

<!-- ================= CONTACT PAGE ================= -->
<section class="contact-page">

    <div class="page-title">
        <h1>Contact Us</h1>
        <p>We’d love to hear from you. Get in touch with us today.</p>
    </div>

    <div class="contact-container">

        <!-- LEFT INFO -->
        <div class="contact-info">

            <div class="info-box">
                <h3>📍 Our Address</h3>
                <p>
                    ISESS Technologies<br>
                    Mahad, Raigad<br>
                    India
                </p>
            </div>

            <div class="info-box">
                <h3>📞 Phone</h3>
                <p>+91 98765 43210</p>
            </div>

            <div class="info-box">
                <h3>✉ Email</h3>
                <p>support@isess.com</p>
            </div>

        </div>

        <!-- RIGHT FORM -->
        <div class="contact-form">
            <h2>Send Us a Message</h2>

            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">

            <label>Email</label>
            <input type="email" placeholder="Enter your email">

            <label>Subject</label>
            <input type="text" placeholder="Enter subject">

            <label>Message</label>
            <textarea placeholder="Type your message"></textarea>

            <button>Send Message</button>
        </div>

    </div>
</section>

<!-- ================= FOOTER ================= -->
<footer>
    © 2026 ISESS Technologies. All rights reserved.
</footer>

</body>
</html>
