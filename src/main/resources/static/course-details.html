<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Course Details</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f3f4f6;
}

.container{
    max-width:900px;
    margin:50px auto;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{
    margin-bottom:20px;
}

.info-row{
    margin-bottom:15px;
}

.label{
    font-weight:bold;
    color:#374151;
}

.progress-bar{
    width:100%;
    height:10px;
    background:#eee;
    border-radius:10px;
    margin-top:10px;
}

.progress-fill{
    height:100%;
    background:#10b981;
    border-radius:10px;
}

.badge{
    display:inline-block;
    margin-top:10px;
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

.completed{
    background:#d1fae5;
    color:#065f46;
}

.progress{
    background:#fef3c7;
    color:#92400e;
}

.buttons{
    margin-top:30px;
    display:flex;
    gap:15px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.back-btn{
    background:#6b7280;
    color:white;
}

.continue-btn{
    background:#10b981;
    color:white;
}
</style>
</head>

<body>

<div class="container">

    <h2 id="courseName">Course Name</h2>

    <div class="info-row">
        <span class="label">Total Fee:</span>
        ₹ <span id="totalFee"></span>
    </div>

    <div class="info-row">
        <span class="label">Paid Amount:</span>
        ₹ <span id="paidFee"></span>
    </div>

    <div class="info-row">
        <span class="label">Remaining:</span>
        ₹ <span id="remainingFee"></span>
    </div>

    

    <span id="statusBadge" class="badge"></span>

    <div class="buttons">
        <button class="back-btn"
            onclick="window.location.href='Student-dash.html'">
            Back
        </button>

        <button class="continue-btn"
            onclick="goToLearning()">
            Continue Learning
        </button>
    </div>

</div>

<script>

let courseId = new URLSearchParams(window.location.search).get("id");

fetch("http://localhost:8080/admission/get/courseById/" + courseId)
.then(res => res.json())
.then(course => {

    document.getElementById("courseName").innerText = course.courseName;
    document.getElementById("totalFee").innerText = course.totalfree;
    document.getElementById("paidFee").innerText = course.paidfree;
    document.getElementById("remainingFee").innerText =
        course.totalfree - course.paidfree;

    let percent = course.completionPercentage || 0;
    document.getElementById("progressFill").style.width = percent + "%";
    document.getElementById("progressText").innerText =
        percent + "% Completed";

    let badge = document.getElementById("statusBadge");
    badge.innerText = course.courseStatus;

    if(course.courseStatus === "COMPLETED"){
        badge.classList.add("completed");
    }else{
        badge.classList.add("progress");
    }

});

function goToLearning(){
    window.location.href =
        "course-learning.html?id=" + courseId;
}

</script>

</body>
</html>
