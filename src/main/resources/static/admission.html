/* VALIDATION FUNCTION */
function validateForm(){

  let errors = [];

  const mob = document.getElementById("mobno").value.trim();
  const email = document.getElementById("email").value.trim();

  if(!/^\d{10}$/.test(mob)){
    errors.push("Enter valid 10-digit Mobile Number");
  }

  if(!email){
    errors.push("Email is required");
  }

  document.querySelectorAll("[required]").forEach(field=>{
    if(!field.value){
      const label = field.closest(".field").querySelector("label").innerText;
      errors.push(label + " is required");
    }
  });

  return errors;
}

/* AUTO FILL STUDENT DATA */

async function loadStudentData(email){

try{

const res = await fetch(`${BASE_URL}/admission/student/get-by-email?email=${email}`);

if(res.status === 404){
    show("New Student - Please fill details", "error");
    return;
}

if(!res.ok){
    show("Error fetching data", "error");
    return;
}

const data = await res.json();
fillForm(data);

show("Previous data loaded", "success");

}catch(err){
    show("Server error", "error");
}

}


function fillForm(data){

  document.querySelector("input[name='sname']").value = data.sname || "";
  document.querySelector("input[name='email']").value = data.email || "";
  document.querySelector("input[name='mobno']").value = data.mobno || "";
  document.querySelector("input[name='dob']").value = data.dob || "";
  document.querySelector("select[name='gender']").value = data.gender || "";

  if(data.state){
    s.value = data.state;
    s.dispatchEvent(new Event("change"));

    setTimeout(()=>{
      if(data.district){
        d.value = data.district;
        d.dispatchEvent(new Event("change"));
      }

      setTimeout(()=>{
        if(data.taluka){
          t.value = data.taluka;
        }
      },200);

    },200);
  }

  document.querySelector("input[name='address']").value = data.address || "";
  
  // PHOTO
  if(data.photopath){
      const img = document.getElementById("photoPreview");
      img.src = data.photopath;
      img.style.display = "block";

      document.querySelector("input[name='photo']").required = false;
  }

  // SIGNATURE
  if(data.signaturePhoto){
      const img = document.getElementById("signPreview");
      img.src = data.signaturePhoto;
      img.style.display = "block";

      document.querySelector("input[name='signature']").required = false;
  }

  // AADHAR
  if(data.adharCradPhoto){
      document.getElementById("adharPreview").style.display = "block";
      document.querySelector("input[name='adharcard']").required = false;
  }

  // MARKSHEET
  if(data.marksheet){
      document.getElementById("marksheetPreview").style.display = "block";
      document.querySelector("input[name='marksheet']").required = false;
  }
  
}

}

const mobInput = document.getElementById("mobno");

let timer;

mobInput.addEventListener("input", () => {

    clearTimeout(timer);

    const mob = mobInput.value.trim();

    if(mob.length === 10){

        timer = setTimeout(() => {
            loadStudentByMobile(mob);
        }, 500);

    } 
    else if(mob.length < 10){
        show("Enter 10 digit mobile number", "error");
    }

});

function goBack(){
    window.history.back();
}

function goDashboard(){
    window.location.href = "student-dash.html";
}

function openDoc(url, type){

  let win = window.open("", "_blank");

  if(type.includes("image")){
    win.document.write(`<img src="${url}" style="width:100%">`);
  }else{
    win.document.write(`
      <iframe src="${url}" width="100%" height="100%"></iframe>
    `);
  }
}
	
// SAVE & NEXT BUTTON
document.getElementById("saveBtn")
.onclick = async ()=>{

   const fd = new FormData(form);

   try{

      const res = await fetch(
         `${BASE_URL}/admission/apply`,
         {
            method:"POST",
            body:fd
         }
      );

      if(!res.ok){

         const msg = await res.text();

         show(
            msg || "Submission Failed",
            "error"
         );

         return;
      }

      document.getElementById(
         "previewPopup"
      ).style.display = "none";

      Swal.fire({
         icon:'success',
         title:'Admission Submitted',
         text:'Admission Saved Successfully',
         confirmButtonText:'Continue'
      }).then(()=>{

         window.location.href =
         'student-dash.html';

      });

   }
   catch(err){

      show(
         "Server Error",
         "error"
      );

   }

};
