<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Authentication</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,rgb(66, 99, 159),rgb(0, 0, 28));
}

/* CARD */

.container{
width:500px;
background:#1c1c1c;
padding:35px;
border-radius:14px;
box-shadow:0 10px 40px rgba(0,0,0,.7);
}

/* TITLE */

.title{
color:white;
text-align:center;
margin-bottom:25px;
}

/* INPUT WRAPPER */

.input-box{
position:relative;
}

input{
width:100%;
padding:13px;
margin-top:12px;
border-radius:8px;
border:1px solid #333;
background:#2a2a2a;
color:white;
}

input:focus{
outline:none;
border:1px solid #ff7a00;
}

/* EYE ICON */

.eye{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:rgb(255, 255, 255);
font-size:14px;
}

/* BUTTON */

button{
width:100%;
padding:13px;
margin-top:18px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#ff512f,#ff7a00);
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:.9;
}

/* LINKS */

.links{
text-align:center;
margin-top:15px;
color:#aaa;
font-size:14px;
}

.links span{
color:#ff7a00;
cursor:pointer;
font-weight:600;
}

/* MESSAGE */

.msg{
text-align:center;
margin-top:12px;
color:red;
font-weight:600;
}

/* FOOTER */

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:#777;
}

.msg{
text-align:center;
margin-top:12px;
color:red;
font-weight:600;
transition:0.5s;
}

</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->

<div id="loginBox">

<h2 class="title">Admin Login</h2>

<input id="aemailLog" placeholder="Email Address">

<div class="input-box">
<input id="apassLog" type="password" placeholder="Password">
<span class="eye" onclick="togglePassword('apassLog',this)">👁</span>
</div>

<button onclick="adminLogin()">Login</button>

<div class="links">
<span onclick="showForgot()">Forgot Password?</span>
</div>

<div class="links">
Don't have account? 
<span onclick="toggleForm('register')">Register</span>
</div>

</div>



<!-- REGISTER -->

<div id="registerBox" style="display:none;">

<h2 class="title">Admin Registration</h2>

<input id="aname" placeholder="Admin Name">
<input id="aemail" placeholder="Email Address">

<div class="input-box">
<input id="apass" type="password" placeholder="Create Password">
<span class="eye" onclick="togglePassword('apass',this)">👁</span>
</div>

<button onclick="adminRegister()">Register</button>

<div class="links">
Already have account? 
<span onclick="toggleForm('login')">Login</span>
</div>

</div>



<!-- FORGOT PASSWORD -->

<div id="forgotBox" style="display:none;">

<h2 class="title">Reset Password</h2>

<input id="femail" placeholder="Email Address">

<div class="input-box">
<input id="fpass" type="password" placeholder="New Password">
<span class="eye" onclick="togglePassword('fpass',this)">👁</span>
</div>

<button onclick="resetPassword()">Reset Password</button>

<div class="links">
<span onclick="toggleForm('login')">Back to Login</span>
</div>

</div>


<div id="msg" class="msg"></div>

<div class="footer">
© 2025 School Administration System
</div>

</div>

<script>

/* SHOW HIDE PASSWORD */

function togglePassword(id,icon){

let input=document.getElementById(id);

if(input.type==="password"){
input.type="text";
icon.innerHTML="🙈";
}else{
input.type="password";
icon.innerHTML="👁";
}

}

/* SWITCH LOGIN REGISTER */

function toggleForm(type){

loginBox.style.display="none";
registerBox.style.display="none";
forgotBox.style.display="none";

if(type==="login") loginBox.style.display="block";
if(type==="register") registerBox.style.display="block";

}

/* SHOW FORGOT PASSWORD */

function showForgot(){

loginBox.style.display="none";
registerBox.style.display="none";
forgotBox.style.display="block";

}

/* REGISTER */

function adminRegister(){

fetch("http://localhost:8080/admin/register",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
adminName:aname.value,
email:aemail.value,
password:apass.value
})

})
.then(r=>r.text())
.then(t=>{
    showMessage(t,"lightgreen");
})

}

/* LOGIN */

function adminLogin(){

fetch("http://localhost:8080/admin/login",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:aemailLog.value,
password:apassLog.value
})

})
.then(r=>r.json())
.then(res=>{
if(res.message==="success"){
    showMessage("Login Successful","lightgreen");

    setTimeout(()=>{
        location.href="admin-dash.html";
    },1000);

}else{
    showMessage(res.message,"red");
}
})

}

/* RESET PASSWORD */

function resetPassword(){

fetch("http://localhost:8080/admin/forgot-password",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:femail.value,
password:fpass.value
})

})
.then(r=>r.text())
.then(t=>{
    showMessage(t,"lightgreen");
})

}

function showMessage(text, color="red"){

let msgBox = document.getElementById("msg");

msgBox.innerHTML = text;
msgBox.style.color = color;
msgBox.style.opacity = "1";

/* AUTO HIDE AFTER 5 SEC */
setTimeout(()=>{
    msgBox.style.opacity = "0";
},5000);

/* CLEAR TEXT */
setTimeout(()=>{
    msgBox.innerHTML = "";
    msgBox.style.opacity = "1";
},5500);

}

</script>

</body>
</html>
